<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamBrain</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh}
code,pre{font-family:'SF Mono',Menlo,Consolas,monospace}
a{color:#6366f1;text-decoration:none}
a:hover{text-decoration:underline}

.bar{display:flex;align-items:center;padding:12px 24px;background:#111;border-bottom:1px solid #222;position:sticky;top:0;z-index:50}
.logo{font-weight:700;color:#6366f1;font-size:16px}
.user-info{margin-left:auto;font-size:13px;color:#888}
.user-info .role-chip{display:inline-block;padding:2px 10px;border-radius:10px;font-size:11px;margin-left:6px}

.pg{display:none;padding:24px;max-width:1200px;margin:0 auto}.pg.on{display:block}

.bt{padding:10px 18px;border-radius:8px;border:none;cursor:pointer;font-size:13px;transition:.15s;font-weight:500}
.bp{background:#6366f1;color:#fff}.bp:hover{background:#5558e6}
.bg{background:#1a1a1a;color:#aaa;border:1px solid #2a2a2a}.bg:hover{color:#fff;border-color:#444}
.bt:disabled{opacity:.5;cursor:not-allowed}

.cd{background:#161616;border:1px solid #222;border-radius:12px;padding:20px}
h2{font-size:20px;margin-bottom:16px}
h3{font-size:15px;color:#999;margin:16px 0 8px}

input[type=text],input[type=password],textarea{width:100%;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#e0e0e0;font-size:14px;outline:none;font-family:inherit}
input:focus,textarea:focus{border-color:#6366f1}

/* ===== PHASE A: BYOK ===== */
.byok-wrap{max-width:560px;margin:80px auto 0}
.byok-wrap h1{font-size:24px;margin-bottom:8px}
.byok-wrap .sub{font-size:14px;color:#888;margin-bottom:24px;line-height:1.6}
.byok-card{background:#161616;border:1px solid #222;border-radius:12px;padding:24px;margin-bottom:12px}
.byok-label{font-size:12px;color:#888;margin-bottom:6px;display:block}
.byok-row{margin-bottom:14px}
.byok-status{min-height:20px;font-size:12px;margin-top:8px}
.byok-note{font-size:12px;color:#666;line-height:1.7;padding:14px;background:#0e0e14;border-radius:8px;border:1px solid #1a1a24}
.role-picker{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px}
.role-pick{padding:10px 8px;background:#1a1a1a;border:1px solid #333;border-radius:8px;cursor:pointer;font-size:12px;text-align:center;transition:.15s}
.role-pick:hover{border-color:#555}
.role-pick.on{border-color:#6366f1;background:#1a1a2e;color:#a5b4fc}

/* ===== PHASE B: BRAIN ===== */
.brain-header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.tabs{display:flex;gap:4px;background:#111;padding:4px;border-radius:10px;border:1px solid #1e1e1e}
.tab{padding:8px 16px;background:transparent;border:none;color:#888;cursor:pointer;font-size:13px;border-radius:6px;font-weight:500}
.tab.on{background:#1a1a2e;color:#a5b4fc}
.tab:hover:not(.on){color:#ccc}
.brain-header .bp{margin-left:auto}

.two-col{display:grid;grid-template-columns:220px 1fr;gap:16px;min-height:500px}

.role-sidebar,.filter-sidebar{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:14px;height:fit-content}
.role-card{padding:12px;margin-bottom:6px;background:#161616;border:1px solid #2a2a2a;border-left-width:3px;border-radius:6px;cursor:pointer;transition:.15s}
.role-card:hover{background:#1a1a1a}
.role-card.on{background:#1a1a2e;border-color:#6366f1}

.filter-label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin:10px 0 6px}
.filter-label:first-child{margin-top:0}
.filter-opt{padding:7px 12px;margin-bottom:4px;background:#161616;border-radius:6px;cursor:pointer;font-size:13px;color:#999;border:1px solid transparent}
.filter-opt:hover{background:#1a1a1a;color:#fff}
.filter-opt.on{background:#1a1a2e;color:#a5b4fc;border-color:#6366f1}

.fw-content{background:#0e0e0e;border:1px solid #1a1a1a;border-radius:10px;padding:28px 32px;overflow-y:auto;max-height:calc(100vh - 180px);line-height:1.7;color:#d0d0d0}
.fw-content h1{font-size:22px;color:#fff;margin:0 0 16px;padding-bottom:10px;border-bottom:1px solid #222}
.fw-content h2{font-size:17px;color:#a5b4fc;margin:22px 0 10px}
.fw-content h3{font-size:14px;color:#ccc;margin:16px 0 6px}
.fw-content p{margin:8px 0}
.fw-content ul,.fw-content ol{margin:8px 0 8px 24px}
.fw-content li{margin:3px 0}
.fw-content code{background:#1a1a1a;padding:2px 6px;border-radius:4px;font-size:12px;color:#fbbf24}
.fw-content pre{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:6px;padding:14px;overflow-x:auto;margin:10px 0;font-size:12px}
.fw-content pre code{background:none;padding:0;color:#ccc}
.fw-content table{border-collapse:collapse;margin:10px 0;font-size:13px;width:100%}
.fw-content th,.fw-content td{border:1px solid #222;padding:6px 10px;text-align:left}
.fw-content th{background:#141420;color:#a5b4fc}
.fw-content blockquote{border-left:3px solid #6366f1;padding:6px 14px;margin:10px 0;color:#aaa;background:#0e0e14}
.fw-content hr{border:none;border-top:1px solid #222;margin:18px 0}

.tl-content{overflow-y:auto;max-height:calc(100vh - 180px);padding-right:4px}
.tl-card{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:14px 18px;margin-bottom:10px;transition:.15s}
.tl-card:hover{border-color:#2a2a2a;background:#131313}
.tl-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.tl-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.5px}
.tl-date{font-size:11px;color:#666;font-family:'SF Mono',monospace}
.tl-topic{font-size:14px;font-weight:600;color:#e0e0e0;flex:1}
.tl-sec{margin-top:6px;font-size:12px;line-height:1.6;display:flex;gap:10px}
.tl-label{color:#666;min-width:44px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding-top:1px}
.tl-sec>div:last-child{color:#bbb;flex:1}

/* ===== PHASE C: CHAT ===== */
.chat-header{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.chat-title{font-size:14px;color:#aaa}
.chat-title .fw-tag{color:#a5b4fc;font-family:'SF Mono',monospace;font-size:12px;background:#1a1a2e;padding:2px 8px;border-radius:4px;margin-left:6px}

.chat-box{background:#0e0e0e;border:1px solid #1a1a1a;border-radius:12px;padding:20px;min-height:420px;max-height:calc(100vh - 360px);overflow-y:auto;margin-bottom:14px}
.chat-hint{color:#666;font-size:13px;line-height:1.7;padding:30px 10px;text-align:center;font-style:italic}
.msg{margin-bottom:14px;display:flex}
.msg-user{justify-content:flex-end}
.msg-assistant{justify-content:flex-start}
.msg-bubble{max-width:82%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6}
.msg-user .msg-bubble{background:#1a1a2e;color:#e0e0e0;border:1px solid #2d2d5e}
.msg-assistant .msg-bubble{background:#141414;color:#d0d0d0;border:1px solid #1e1e1e}
.msg-bubble p{margin:6px 0}
.msg-bubble p:first-child{margin-top:0}
.msg-bubble p:last-child{margin-bottom:0}
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{margin:10px 0 6px;color:#fff}
.msg-bubble h2{font-size:15px;color:#a5b4fc}
.msg-bubble h3{font-size:13px;color:#ccc}
.msg-bubble ul,.msg-bubble ol{margin:6px 0 6px 20px}
.msg-bubble li{margin:2px 0}
.msg-bubble code{background:#0a0a0a;padding:2px 6px;border-radius:4px;font-size:12px;color:#fbbf24}
.msg-bubble pre{background:#0a0a0a;border:1px solid #222;border-radius:6px;padding:12px;overflow-x:auto;margin:8px 0;font-size:12px}
.msg-bubble pre code{background:none;padding:0;color:#ccc}
.msg-bubble table{border-collapse:collapse;margin:8px 0;font-size:12px;width:100%}
.msg-bubble th,.msg-bubble td{border:1px solid #222;padding:5px 8px;text-align:left}
.msg-bubble th{background:#141420;color:#a5b4fc}

.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;resize:none;font-size:14px}

.saved-preview{background:#0e1a0e;border:1px solid #14532d;border-radius:10px;padding:16px;margin-bottom:14px}
.saved-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px}
.saved-head code{font-size:11px}
.saved-actions{display:flex;gap:6px;flex-shrink:0}
.saved-actions .bt{padding:6px 10px;font-size:12px}
.saved-md{background:#0a0a0a;border:1px solid #1a2a1a;border-radius:6px;padding:12px;font-size:11px;max-height:240px;overflow:auto;line-height:1.5;color:#b0d0b0;white-space:pre-wrap;word-break:break-word}

/* ===== GITHUB MODAL ===== */
.gh-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center}
.gh-modal{background:#161616;border:1px solid #333;border-radius:16px;padding:26px;width:440px;max-width:92vw;position:relative}
.gh-modal h3{font-size:16px;margin-bottom:14px}
.gh-close{position:absolute;top:12px;right:14px;background:none;border:none;color:#666;font-size:20px;cursor:pointer}
.gh-close:hover{color:#fff}
.gh-label{font-size:12px;color:#888;margin:12px 0 5px;display:flex;justify-content:space-between;align-items:baseline}
.gh-label a{font-size:11px}
.gh-input{width:100%;background:#0a0a0a;border:1px solid #333;border-radius:8px;padding:10px 12px;color:#e0e0e0;font-size:13px;margin-bottom:4px;outline:none;font-family:'SF Mono',monospace}
.gh-input:focus{border-color:#6366f1}
.gh-btn{width:100%;padding:11px;background:#6366f1;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px}
.gh-btn:hover{background:#5558e6}
.gh-cancel{width:100%;background:none;border:1px solid #333;color:#888;padding:9px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:8px}
.gh-cancel:hover{border-color:#555;color:#ccc}
@keyframes gh-spin{to{transform:rotate(360deg)}}
.gh-spinner{width:22px;height:22px;border:3px solid #333;border-top-color:#6366f1;border-radius:50%;animation:gh-spin .8s linear infinite;margin:0 auto 12px}

@media (max-width:820px){
  .two-col{grid-template-columns:1fr}
  .role-sidebar,.filter-sidebar{max-width:none}
  .role-picker{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="bar">
  <div class="logo">🧠 TeamBrain</div>
  <div class="user-info" id="userInfo"></div>
</div>

<div id="phaseByok" class="pg"></div>
<div id="phaseBrain" class="pg"></div>
<div id="phaseChat" class="pg"></div>

<script>
// ===== STATE =====
const B = {
  name: '',
  role: '',
  key: '',
  ctx: null,
  traces: [],
  chat: [],
  activeTab: 'frameworks',
  selectedFwRole: 'pm',
  filterRole: 'all',
  filterDays: 30,
  savedMarkdown: '',
  busy: false,
};

const ROLE_STYLES = {
  pm:          {label:'PM',          color:'#60a5fa'},
  engineering: {label:'Engineering', color:'#4ade80'},
  design:      {label:'Design',      color:'#fbbf24'},
  uxr:         {label:'UX Research', color:'#f87171'},
  gtm:         {label:'GTM',         color:'#22d3ee'},
};

const MODEL = 'claude-sonnet-4-20250514';

// ===== INIT =====
function init() {
  const params = new URLSearchParams(location.search);
  B.name = params.get('name') || localStorage.getItem('tb_name') || '';
  B.role = params.get('role') || localStorage.getItem('tb_role') || '';
  if (B.name) localStorage.setItem('tb_name', B.name);
  if (B.role) localStorage.setItem('tb_role', B.role);
  B.selectedFwRole = B.role || 'pm';
  renderUserInfo();
  B.key = localStorage.getItem('anthropic_key') || '';
  if (B.key && B.role) {
    enterBrain();
  } else {
    renderByok();
    showPhase('Byok');
  }
}

function renderUserInfo() {
  const el = document.getElementById('userInfo');
  if (!B.name && !B.role) { el.innerHTML = ''; return; }
  const s = ROLE_STYLES[B.role];
  const chip = s ? `<span class="role-chip" style="background:${s.color}22;color:${s.color}">${s.label}</span>` : '';
  el.innerHTML = `${B.name || '익명'}${chip}`;
}

function showPhase(name) {
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('on'));
  document.getElementById('phase' + name).classList.add('on');
}

function escapeHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== PHASE A: BYOK =====
function renderByok() {
  const roles = ['pm','engineering','design','uxr','gtm'];
  document.getElementById('phaseByok').innerHTML = `
    <div class="byok-wrap">
      <h1>팀 브레인에 접속합니다</h1>
      <div class="sub">인적성검사는 끝났어요. 이제 팀의 멘탈 모델을 열람하고, 직접 trace를 남길 수 있어요.<br>대화는 이 브라우저에서 Anthropic API로 <strong>직접 호출</strong>됩니다. 키는 로컬 저장소에만 저장돼요.</div>

      <div class="byok-card">
        <div class="byok-row">
          <label class="byok-label">이름</label>
          <input type="text" id="byokName" placeholder="김세일즈" value="${escapeHtml(B.name)}">
        </div>

        <div class="byok-row">
          <label class="byok-label">역할</label>
          <div class="role-picker" id="rolePicker">
            ${roles.map(r => {
              const s = ROLE_STYLES[r];
              const on = r === B.role ? 'on' : '';
              return `<div class="role-pick ${on}" data-role="${r}" onclick="pickRole('${r}')" style="border-left:3px solid ${s.color}">${s.label}</div>`;
            }).join('')}
          </div>
        </div>

        <div class="byok-row">
          <label class="byok-label">Anthropic API 키 <a href="https://console.anthropic.com/settings/keys" target="_blank" style="font-size:11px;float:right">키 발급 →</a></label>
          <input type="password" id="byokKey" placeholder="sk-ant-..." value="${escapeHtml(B.key)}">
        </div>

        <button class="bt bp" style="width:100%;padding:12px" onclick="validateAndEnter()">연결 → 팀 브레인 열기</button>
        <button class="bt bg" style="width:100%;margin-top:8px;padding:10px;font-size:12px" onclick="skipValidationAndEnter()">검증 건너뛰기 (키가 맞다고 확신하면)</button>
        <div class="byok-status" id="byokStatus"></div>
      </div>

      <div class="byok-note">
        <strong>BYOK (Bring Your Own Key)</strong>에 대해:<br>
        • API 키는 <code>localStorage.anthropic_key</code>에만 저장됩니다 (서버로 전송되지 않음)<br>
        • 모든 Claude 호출은 브라우저에서 <code>api.anthropic.com</code>으로 직통<br>
        • 사용량은 본인 Anthropic 계정에 청구됩니다<br>
        • 로그아웃하려면 브라우저 콘솔에서 <code>localStorage.clear()</code>
      </div>
    </div>
  `;
}

function pickRole(role) {
  B.role = role;
  B.selectedFwRole = role;
  document.querySelectorAll('#rolePicker .role-pick').forEach(el => {
    el.classList.toggle('on', el.dataset.role === role);
  });
}

function collectByokInputs() {
  const name = document.getElementById('byokName').value.trim();
  const key = document.getElementById('byokKey').value.trim();
  const status = document.getElementById('byokStatus');
  if (!name) { status.innerHTML = '<span style="color:#f87171">이름을 입력해주세요</span>'; return null; }
  if (!B.role) { status.innerHTML = '<span style="color:#f87171">역할을 선택해주세요</span>'; return null; }
  if (!key.startsWith('sk-ant-')) { status.innerHTML = '<span style="color:#f87171">키 형식이 맞지 않습니다 (sk-ant-로 시작)</span>'; return null; }
  return { name, key, status };
}

function saveAndEnterBrain(name, key) {
  B.name = name;
  B.key = key;
  localStorage.setItem('tb_name', name);
  localStorage.setItem('tb_role', B.role);
  localStorage.setItem('anthropic_key', key);
  renderUserInfo();
  enterBrain();
}

function skipValidationAndEnter() {
  const inputs = collectByokInputs();
  if (!inputs) return;
  inputs.status.innerHTML = '<span style="color:#888">검증 건너뜀 · 이동 중...</span>';
  saveAndEnterBrain(inputs.name, inputs.key);
}

async function validateAndEnter() {
  const inputs = collectByokInputs();
  if (!inputs) return;
  const { name, key, status } = inputs;

  status.innerHTML = '<span style="color:#888">키 검증 중... (5초 타임아웃)</span>';
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 5000);
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      signal: controller.signal,
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 10,
        messages: [{role:'user', content:'hi'}],
      }),
    });
    clearTimeout(timer);
    if (!r.ok) {
      const errText = await r.text();
      status.innerHTML = `<span style="color:#f87171">검증 실패 (${r.status}): ${escapeHtml(errText.slice(0,200))}</span><br><span style="color:#888;font-size:11px">"검증 건너뛰기"로 그대로 진행할 수도 있습니다</span>`;
      return;
    }
    status.innerHTML = '<span style="color:#4ade80">✓ 연결됨 · 이동 중...</span>';
    saveAndEnterBrain(name, key);
  } catch (e) {
    clearTimeout(timer);
    const msg = e.name === 'AbortError' ? '5초 타임아웃 (CORS preflight 막혔을 수 있음)' : e.message;
    status.innerHTML = `<span style="color:#f87171">${escapeHtml(msg)}</span><br><span style="color:#888;font-size:11px">"검증 건너뛰기" 버튼을 눌러 그대로 진행하세요</span>`;
  }
}

// ===== PHASE B: BRAIN =====
async function enterBrain() {
  showPhase('Brain');
  document.getElementById('phaseBrain').innerHTML = `<div style="padding:40px;text-align:center;color:#666">
    컨텍스트 로딩 중...
    <div style="font-size:11px;color:#444;margin-top:10px">GET ${location.origin}/api/context?role=${encodeURIComponent(B.role)}</div>
  </div>`;
  if (!B.ctx) {
    const ok = await loadContext();
    if (!ok) return;
  }
  renderBrain();
}

async function loadContext() {
  const url = '/api/context?role=' + encodeURIComponent(B.role);
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 8000);
  try {
    const r = await fetch(url, { signal: controller.signal });
    clearTimeout(timer);
    if (!r.ok) {
      document.getElementById('phaseBrain').innerHTML = `<div style="color:#f87171;padding:40px;text-align:center">
        <div style="font-size:16px;margin-bottom:10px">❌ 컨텍스트 로딩 실패 (HTTP ${r.status})</div>
        <div style="font-size:12px;color:#888">엔드포인트: ${escapeHtml(location.origin + url)}</div>
        <div style="font-size:12px;color:#888;margin-top:6px">서버 주소가 맞는지 확인하세요. brain.html이 <code>localhost:3002</code>에서 서빙되어야 합니다.</div>
      </div>`;
      return false;
    }
    B.ctx = await r.json();
    return true;
  } catch (e) {
    clearTimeout(timer);
    const msg = e.name === 'AbortError' ? '타임아웃 (8초)' : e.message;
    document.getElementById('phaseBrain').innerHTML = `<div style="color:#f87171;padding:40px;text-align:center">
      <div style="font-size:16px;margin-bottom:10px">❌ 컨텍스트 fetch 실패</div>
      <div style="font-size:13px;margin-bottom:8px">${escapeHtml(msg)}</div>
      <div style="font-size:12px;color:#888">엔드포인트: ${escapeHtml(location.origin + url)}</div>
      <div style="font-size:12px;color:#888;margin-top:6px">이 URL을 브라우저 새 탭에 직접 붙여넣어 응답이 오는지 확인해보세요.</div>
    </div>`;
    return false;
  }
}

function renderBrain() {
  const active = B.activeTab;
  document.getElementById('phaseBrain').innerHTML = `
    <div class="brain-header">
      <div class="tabs">
        <button class="tab ${active==='frameworks'?'on':''}" onclick="setTab('frameworks')">🧭 프레임워크</button>
        <button class="tab ${active==='timeline'?'on':''}" onclick="setTab('timeline')">📜 타임라인</button>
      </div>
      <button class="bt bp" onclick="startChat()">+ 새 trace 쓰기</button>
    </div>
    <div id="tabContent"></div>
  `;
  renderActiveTab();
}

function setTab(tab) {
  B.activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  event.target.classList.add('on');
  renderActiveTab();
}

function renderActiveTab() {
  const el = document.getElementById('tabContent');
  if (B.activeTab === 'frameworks') {
    el.innerHTML = renderFrameworksTab();
  } else {
    el.innerHTML = renderTimelineTab();
    loadAndRenderTraces();
  }
}

function renderFrameworksTab() {
  if (!B.ctx || !B.ctx.all_frameworks) return '<div>프레임워크 로딩 실패</div>';
  const roles = Object.keys(B.ctx.all_frameworks);
  const selected = B.selectedFwRole;
  const fw = B.ctx.all_frameworks[selected] || B.ctx.all_frameworks[roles[0]];
  // Strip frontmatter for cleaner render
  const cleanMd = (fw.content || '').replace(/^---\s*\n[\s\S]*?\n---\s*\n/, '');
  return `
    <div class="two-col">
      <div class="role-sidebar">
        ${roles.map(r => {
          const s = ROLE_STYLES[r] || {label:r, color:'#888'};
          const on = r === selected ? 'on' : '';
          return `<div class="role-card ${on}" style="border-left-color:${s.color}" onclick="selectFwRole('${r}')">
            <div style="color:${s.color};font-weight:600;font-size:13px">${s.label}</div>
            <div style="font-size:10px;color:#666;margin-top:3px;font-family:'SF Mono',monospace">${B.ctx.all_frameworks[r].name}.md</div>
          </div>`;
        }).join('')}
      </div>
      <div class="fw-content">${marked.parse(cleanMd)}</div>
    </div>
  `;
}

function selectFwRole(role) {
  B.selectedFwRole = role;
  renderActiveTab();
}

function renderTimelineTab() {
  return `
    <div class="two-col">
      <div class="filter-sidebar">
        <div class="filter-label">역할</div>
        ${['all','pm','engineering','design','uxr','gtm'].map(r => {
          const label = r === 'all' ? '전체' : (ROLE_STYLES[r]?.label || r);
          const color = r === 'all' ? '#888' : (ROLE_STYLES[r]?.color || '#888');
          const on = r === B.filterRole ? 'on' : '';
          return `<div class="filter-opt ${on}" onclick="setFilterRole('${r}')" style="border-left:2px solid ${color}">${label}</div>`;
        }).join('')}
        <div class="filter-label">기간</div>
        ${[[1,'1일'],[7,'7일'],[30,'30일'],[9999,'전체']].map(([d,l]) => {
          const on = d === B.filterDays ? 'on' : '';
          return `<div class="filter-opt ${on}" onclick="setFilterDays(${d})">${l}</div>`;
        }).join('')}
      </div>
      <div class="tl-content" id="tlContent">
        <div style="padding:40px;text-align:center;color:#666">로딩 중...</div>
      </div>
    </div>
  `;
}

function setFilterRole(r) { B.filterRole = r; renderActiveTab(); }
function setFilterDays(d) { B.filterDays = d; renderActiveTab(); }

async function loadAndRenderTraces() {
  const el = document.getElementById('tlContent');
  if (!el) return;
  try {
    const r = await fetch(`/api/traces?role=${encodeURIComponent(B.filterRole)}&days=${B.filterDays}`);
    const data = await r.json();
    B.traces = data.traces || [];
    if (B.traces.length === 0) {
      el.innerHTML = '<div style="padding:60px;text-align:center;color:#666">해당 조건의 trace가 없습니다<br><span style="font-size:12px;color:#444">(GTM은 아직 trace가 없어요 — 새로 쓰러 가보세요!)</span></div>';
      return;
    }
    el.innerHTML = B.traces.map(t => {
      const s = ROLE_STYLES[t.role] || {label:t.role, color:'#888'};
      const isMeeting = t.type === 'meeting';
      const badge = isMeeting
        ? `<span class="tl-badge" style="background:#3b2e11;color:#fbbf24">MEETING</span>`
        : `<span class="tl-badge" style="background:${s.color}22;color:${s.color}">${s.label}</span>`;
      return `
        <div class="tl-card">
          <div class="tl-head">
            ${badge}
            <span class="tl-date">${t.date}</span>
            <span class="tl-topic">${escapeHtml(t.topic)}</span>
          </div>
          ${t.summary ? `<div class="tl-sec"><div class="tl-label">핵심</div><div>${escapeHtml(t.summary)}</div></div>` : ''}
          ${t.decision ? `<div class="tl-sec"><div class="tl-label">결정</div><div>${escapeHtml(t.decision)}</div></div>` : ''}
          ${t.insight ? `<div class="tl-sec"><div class="tl-label">인사이트</div><div>${escapeHtml(t.insight)}</div></div>` : ''}
        </div>
      `;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div style="color:#f87171;padding:40px;text-align:center">traces 로딩 실패: ${escapeHtml(e.message)}</div>`;
  }
}

// ===== PHASE C: CHAT =====
function startChat() {
  if (!B.ctx) return;
  B.chat = [];
  B.savedMarkdown = '';
  showPhase('Chat');
  renderChat();
  setTimeout(() => document.getElementById('chatInput')?.focus(), 100);
}

function renderChat() {
  const fwName = B.ctx.current_framework_name;
  document.getElementById('phaseChat').innerHTML = `
    <div class="chat-header">
      <button class="bt bg" onclick="showPhase('Brain');renderBrain()">← 브레인으로</button>
      <div class="chat-title">새 trace 쓰기 · ${escapeHtml(ROLE_STYLES[B.role]?.label || B.role)} · <span class="fw-tag">${fwName}.md</span></div>
    </div>
    <div class="chat-box" id="chatBox">
      ${B.chat.length === 0 ? '<div class="chat-hint">오늘 뭘 했는지, 누구랑 얘기했는지, 뭘 결정했는지 편하게 얘기해보세요.<br>다 말한 다음 <strong>[💾 Save]</strong>를 누르면 프레임워크에 맞춰 정리해서 trace로 저장합니다.</div>' : ''}
      ${B.chat.map(m => `<div class="msg msg-${m.role}"><div class="msg-bubble">${m.role === 'assistant' ? marked.parse(m.content) : escapeHtml(m.content).replace(/\n/g,'<br>')}</div></div>`).join('')}
    </div>
    ${B.savedMarkdown ? renderSavedPreview() : ''}
    <div class="chat-input-row">
      <textarea id="chatInput" class="chat-input" placeholder="메시지 입력 (Enter 전송, Shift+Enter 줄바꿈)" rows="2" ${B.busy?'disabled':''}></textarea>
      <button class="bt bp" onclick="sendMessage()" ${B.busy?'disabled':''}>전송</button>
      <button class="bt" style="background:#22c55e;color:#fff" onclick="triggerSave()" ${B.busy?'disabled':''}>💾 Save</button>
    </div>
  `;
  const box = document.getElementById('chatBox');
  if (box) box.scrollTop = box.scrollHeight;
  const input = document.getElementById('chatInput');
  if (input) {
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  }
}

function buildSystemPrompt() {
  const ctx = B.ctx;
  const recentDigest = (ctx.recent_traces || []).map(t => `- [${t.date}] (${t.role}/${t.type}) ${t.topic}: ${t.summary}`).join('\n');
  return `당신은 TeamBrain의 사고 동반자입니다.
현재 사용자 이름: ${B.name || '익명'}
현재 사용자 역할: ${B.role}

=== 저장 규약 (SKILL.md) ===
${ctx.skill}

=== ${ctx.current_framework_name}.md (현재 역할의 사고 프레임워크) ===
${ctx.current_framework}

=== 팀 최근 맥락 (참고용) ===
${recentDigest}

대화 규칙:
- 평소엔 자연스러운 사고 파트너로 응답하세요. 사용자가 오늘 있었던 일, 결정한 것, 고민을 편하게 말하도록 유도하고, 프레임워크의 관점에서 좋은 질문을 던지세요.
- 사용자가 [Save]를 누르면 합성 user 메시지 "지금까지 대화를 /save 플로우로 저장해줘. 역할은 ${B.role}"가 들어옵니다. 이때 위 SKILL.md의 7단계를 순서대로 수행하세요.
- SKILL.md 2단계의 "프레임워크 파일 Read" 지시는 무시하세요 — 위 === ${ctx.current_framework_name}.md === 블록을 그 프레임워크로 간주해 섹션 매칭에 사용하세요.
- SKILL.md 6단계에서 최종 파일을 생성할 때, 파일 쓰기 도구가 없으므로 최종 마크다운을 반드시 아래 형식으로 감싸서 출력하세요:
\`\`\`trace
---
date: YYYY-MM-DD
type: trace
role: ${B.role}
topic: ...
(나머지 frontmatter)
---

# 제목

## 날짜
...

(나머지 본문)
\`\`\`
  프론트매터와 본문 전체를 반드시 이 \`\`\`trace 블록 안에 포함하세요. 브라우저가 이 블록을 추출해서 GitHub에 커밋합니다.`;
}

async function sendMessage() {
  if (B.busy) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  B.chat.push({role:'user', content:text});
  await callClaude();
}

async function triggerSave() {
  if (B.busy) return;
  if (B.chat.length === 0) {
    alert('먼저 대화를 해주세요. 오늘 있었던 일, 결정한 것 등을 말해보세요.');
    return;
  }
  const synthetic = `지금까지 대화를 /save 플로우로 저장해줘. 역할은 ${B.role}.`;
  B.chat.push({role:'user', content:synthetic});
  await callClaude();
}

async function callClaude() {
  B.busy = true;
  B.chat.push({role:'assistant', content:'_생각 중..._'});
  renderChat();
  try {
    const messages = B.chat.filter(m => m.content !== '_생각 중..._').map(m => ({role:m.role, content:m.content}));
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': B.key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: MODEL,
        max_tokens: 4096,
        system: buildSystemPrompt(),
        messages,
      }),
    });
    const data = await r.json();
    B.chat.pop(); // remove thinking
    if (data.error) {
      B.chat.push({role:'assistant', content:`❌ 에러: ${data.error.message || JSON.stringify(data.error)}`});
    } else {
      const text = data.content?.[0]?.text || '(응답 없음)';
      B.chat.push({role:'assistant', content:text});
      const traceMatch = text.match(/```trace\s*\n([\s\S]*?)\n```/);
      if (traceMatch) {
        B.savedMarkdown = traceMatch[1].trim();
      }
    }
  } catch (e) {
    B.chat.pop();
    B.chat.push({role:'assistant', content:`❌ 네트워크 에러: ${e.message}`});
  } finally {
    B.busy = false;
    renderChat();
  }
}

function renderSavedPreview() {
  const md = B.savedMarkdown;
  const roleMatch = md.match(/^role:\s*(\w+)/m);
  const dateMatch = md.match(/^date:\s*([\d-]+)/m);
  const topicMatch = md.match(/^topic:\s*(.+)$/m);
  const role = roleMatch ? roleMatch[1] : B.role;
  const date = dateMatch ? dateMatch[1] : new Date().toISOString().slice(0,10);
  const topicRaw = topicMatch ? topicMatch[1].replace(/^['"]|['"]$/g,'').trim() : 'new-trace';
  const slug = topicRaw.slice(0,50).replace(/[\s/\\]+/g,'-').replace(/[^\w가-힣-]/g,'');
  const filepath = `docs/roles/${role}/traces/${date}-${slug}.md`;
  return `
    <div class="saved-preview">
      <div class="saved-head">
        <div>
          <div style="font-weight:600;color:#4ade80">✓ trace 생성 완료</div>
          <div style="font-size:12px;color:#888;margin-top:3px"><code>${escapeHtml(filepath)}</code></div>
        </div>
        <div class="saved-actions">
          <button class="bt bg" onclick="copyMd()">복사</button>
          <button class="bt bg" onclick="downloadMd('${escapeHtml(filepath).replace(/'/g,"\\'")}')">.md</button>
          <button class="bt bp" onclick="openGhModal('${escapeHtml(filepath).replace(/'/g,"\\'")}')">🔗 GitHub 커밋</button>
        </div>
      </div>
      <pre class="saved-md">${escapeHtml(md)}</pre>
    </div>
  `;
}

function copyMd() {
  navigator.clipboard.writeText(B.savedMarkdown).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✓ 복사됨';
    setTimeout(() => btn.textContent = orig, 1200);
  });
}

function downloadMd(filepath) {
  const blob = new Blob([B.savedMarkdown], {type:'text/markdown;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filepath.split('/').pop();
  a.click();
}

// ===== GITHUB COMMIT =====
function openGhModal(filepath) {
  const existing = document.getElementById('ghOverlay');
  if (existing) existing.remove();
  const savedRepo = localStorage.getItem('gh_repo') || '';
  const savedToken = sessionStorage.getItem('gh_token') || '';
  const overlay = document.createElement('div');
  overlay.id = 'ghOverlay';
  overlay.className = 'gh-overlay';
  overlay.innerHTML = `
    <div class="gh-modal">
      <button class="gh-close" onclick="closeGhModal()">&times;</button>
      <div id="ghBody">
        <h3>🔗 GitHub에 trace 커밋</h3>
        <div style="font-size:12px;color:#888"><code>${escapeHtml(filepath)}</code></div>
        <div class="gh-label">Repository</div>
        <input class="gh-input" id="ghRepo" placeholder="owner/repo-name" value="${escapeHtml(savedRepo)}">
        <div class="gh-label">Personal Access Token <a href="https://github.com/settings/tokens/new?scopes=repo&description=TeamBrain" target="_blank">발급 →</a></div>
        <input class="gh-input" id="ghToken" type="password" placeholder="ghp_..." value="${escapeHtml(savedToken)}">
        <button class="gh-btn" onclick="ghCommit('${filepath.replace(/'/g,"\\'")}')">커밋하기</button>
        <button class="gh-cancel" onclick="closeGhModal()">취소</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeGhModal(); });
}

function closeGhModal() {
  const el = document.getElementById('ghOverlay');
  if (el) el.remove();
}

async function ghCommit(filepath) {
  const repo = document.getElementById('ghRepo').value.trim();
  const token = document.getElementById('ghToken').value.trim();
  if (!repo || !token) {
    const status = document.createElement('div');
    status.style.cssText = 'color:#f87171;font-size:12px;margin-top:8px';
    status.textContent = 'repo와 token 모두 필요합니다';
    document.getElementById('ghBody').appendChild(status);
    return;
  }
  localStorage.setItem('gh_repo', repo);
  sessionStorage.setItem('gh_token', token);

  const body = document.getElementById('ghBody');
  body.innerHTML = `<div style="padding:20px 0;text-align:center"><div class="gh-spinner"></div><p style="color:#888;font-size:13px">커밋 중...</p></div>`;

  try {
    const apiUrl = `https://api.github.com/repos/${repo}/contents/${filepath}`;
    // Check if file exists to get SHA
    let sha = null;
    const headRes = await fetch(apiUrl, {
      headers: {'Authorization': 'token ' + token, 'Accept': 'application/vnd.github+json'}
    });
    if (headRes.ok) {
      const existing = await headRes.json();
      sha = existing.sha;
    }

    // Base64 encode preserving UTF-8
    const contentB64 = btoa(unescape(encodeURIComponent(B.savedMarkdown)));

    const putBody = {
      message: `Add trace: ${filepath.split('/').pop()}`,
      content: contentB64,
      ...(sha ? {sha} : {}),
    };

    const putRes = await fetch(apiUrl, {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(putBody),
    });

    if (!putRes.ok) {
      const errText = await putRes.text();
      body.innerHTML = `
        <h3>❌ 커밋 실패 (${putRes.status})</h3>
        <pre style="font-size:11px;background:#0a0a0a;padding:10px;border-radius:6px;color:#f87171;white-space:pre-wrap;margin:12px 0;max-height:200px;overflow:auto">${escapeHtml(errText.slice(0,600))}</pre>
        <button class="gh-cancel" onclick="closeGhModal()">닫기</button>
      `;
      return;
    }

    const result = await putRes.json();
    const commitUrl = result.commit?.html_url || `https://github.com/${repo}/blob/main/${filepath}`;
    body.innerHTML = `
      <div style="text-align:center;padding:14px 0">
        <div style="font-size:40px;margin-bottom:8px">✅</div>
        <h3 style="margin-bottom:6px">커밋 완료</h3>
        <p style="color:#888;font-size:12px;margin:8px 0"><code>${escapeHtml(filepath)}</code></p>
        <a href="${commitUrl}" target="_blank" style="display:inline-block;margin-top:6px;color:#6366f1;font-size:13px;word-break:break-all">${escapeHtml(commitUrl)}</a>
        <button class="gh-cancel" onclick="closeGhModal()" style="margin-top:16px">닫기</button>
      </div>
    `;
  } catch (e) {
    body.innerHTML = `<h3>❌ 에러</h3><pre style="font-size:12px;color:#f87171;margin:12px 0">${escapeHtml(e.message)}</pre><button class="gh-cancel" onclick="closeGhModal()">닫기</button>`;
  }
}

try { init(); } catch (e) {
  document.body.innerHTML = '<pre style="color:red;padding:20px">ERROR: '+e.message+'\n'+e.stack+'</pre>';
}
