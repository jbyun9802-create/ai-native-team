<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TeamBrain — Team Mental Model</title>
<style>
  :root {
    --bg: #08080d; --surface: #0e0e16; --surface2: #14141e;
    --border: #1c1c2a; --border-light: #2a2a3e;
    --text: #e0e0e8; --text-dim: #8888a0; --text-muted: #555568;
    --meeting: #8b5cf6;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  .topbar { position:sticky; top:0; z-index:100; display:flex; align-items:center; padding:12px 28px; background:rgba(8,8,13,0.92); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
  .topbar h1 { font-size:14px; font-weight:600; color:#6366f1; letter-spacing:2px; }
  .topbar .sep { width:1px; height:20px; background:var(--border); margin:0 16px; }
  .topbar .gen { font-size:10px; color:var(--text-muted); margin-left:auto; }
  .period-tabs { display:flex; gap:4px; margin-left:16px; }
  .period-btn { padding:4px 10px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:11px; cursor:pointer; }
  .period-btn:hover { border-color:var(--border-light); }
  .period-btn.active { border-color:#6366f1; color:var(--text); background:rgba(99,102,241,0.08); }

  .main { display:flex; height:calc(100vh - 49px); }

  /* People Panel */
  .people { width:280px; min-width:280px; border-right:1px solid var(--border); overflow-y:auto; background:var(--surface); }
  .person-card { padding:16px 20px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.2s; }
  .person-card:hover { background:var(--surface2); }
  .person-card.active { background:rgba(99,102,241,0.06); border-left:3px solid var(--card-color); }
  .pc-header { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
  .pc-dot { width:10px; height:10px; border-radius:50%; }
  .pc-name { font-size:13px; font-weight:600; }
  .pc-role { font-size:11px; color:var(--text-dim); }
  .pc-mind { font-size:11px; color:var(--text-muted); line-height:1.5; margin-top:6px; }
  .pc-mind strong { color:var(--text-dim); font-weight:500; }
  .pc-meta { font-size:10px; color:var(--text-muted); margin-top:6px; display:flex; gap:12px; }

  /* Alerts */
  .alerts { padding:10px 20px; border-bottom:1px solid var(--border); background:rgba(245,158,11,0.03); }
  .alert { display:flex; align-items:center; gap:8px; padding:4px 0; font-size:11px; color:#f59e0b; }
  .alert-icon { font-size:13px; }

  /* Content */
  .content { flex:1; overflow-y:auto; padding:24px 28px 100px; max-width:900px; }

  /* Mind snapshot */
  .mind { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:24px; }
  .mind-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .mind-head h3 { font-size:12px; font-weight:600; color:var(--text-dim); }
  .mind-tabs { display:flex; gap:4px; }
  .mind-btn { padding:3px 10px; border-radius:5px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:10px; cursor:pointer; }
  .mind-btn.active { border-color:#6366f1; color:var(--text); background:rgba(99,102,241,0.08); }
  .mind-item { padding-left:12px; border-left:2px solid var(--border); margin-bottom:12px; }
  .mind-item:first-child { border-left-color:var(--item-color); }
  .mi-topic { font-size:13px; font-weight:500; line-height:1.4; }
  .mi-insight { font-size:12px; color:var(--text-dim); line-height:1.5; margin-top:3px; font-style:italic; }
  .mi-date { font-size:10px; color:var(--text-muted); margin-top:3px; }
  .mind-empty { font-size:12px; color:var(--text-muted); font-style:italic; }

  /* Timeline */
  .date-group { margin-bottom:24px; }
  .date-label { font-size:11px; font-weight:600; color:var(--text-muted); margin-bottom:10px; display:flex; align-items:center; gap:10px; }
  .date-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .trace-card { margin-left:20px; padding:14px 18px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:6px; cursor:pointer; transition:all 0.2s; border-left:3px solid var(--card-color,var(--border)); }
  .trace-card:hover { border-color:var(--border-light); background:var(--surface2); }
  .trace-card.expanded { background:var(--surface2); }
  .tc-type { font-size:9px; text-transform:uppercase; letter-spacing:1px; margin-bottom:4px; }
  .tc-topic { font-size:13px; font-weight:500; line-height:1.4; }
  .tc-summary { font-size:12px; color:var(--text-dim); line-height:1.5; margin-top:6px; }
  .tc-detail { display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--border); }
  .trace-card.expanded .tc-detail { display:block; }
  .tc-detail h4 { font-size:9px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-muted); margin-bottom:4px; }
  .tc-detail p { font-size:12px; line-height:1.6; color:var(--text-dim); margin-bottom:10px; }
  .tc-file { font-size:10px; color:var(--text-muted); margin-top:8px; }

  .meeting-card { margin-left:20px; padding:10px 16px; background:rgba(139,92,246,0.04); border:1px solid rgba(139,92,246,0.12); border-radius:10px; margin-bottom:6px; cursor:pointer; }
  .meeting-card:hover { background:rgba(139,92,246,0.08); }
  .meeting-card .tc-type { color:var(--meeting); }
  .meeting-card.expanded .tc-detail { display:block; }

  .reasoning-link { margin-left:28px; padding:3px 0; font-size:11px; color:var(--text-muted); }
  .reasoning-link em { color:var(--text-dim); font-style:normal; }

  /* Team overview */
  .team-header { margin-bottom:20px; }
  .team-header h2 { font-size:18px; font-weight:600; }
  .team-header p { font-size:12px; color:var(--text-dim); margin-top:4px; }

  .all-lane { margin-bottom:28px; }
  .lane-head { display:flex; align-items:center; gap:10px; padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:12px; }
  .lane-dot { width:10px; height:10px; border-radius:50%; }
  .lane-name { font-size:13px; font-weight:600; }
  .lane-role { font-size:11px; color:var(--text-dim); }
  .lane-count { margin-left:auto; font-size:10px; color:var(--text-muted); }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>
<div class="topbar">
  <h1>TEAMBRAIN</h1>
  <div class="sep"></div>
  <span style="font-size:12px;color:var(--text-dim)">Team Mental Model</span>
  <div class="period-tabs">
    <button class="period-btn" onclick="setPeriod(1)">1일</button>
    <button class="period-btn" onclick="setPeriod(7)">7일</button>
    <button class="period-btn active" onclick="setPeriod(30)">30일</button>
    <button class="period-btn" onclick="setPeriod(0)">전체</button>
  </div>
  <span class="gen" id="genTime"></span>
</div>
<div class="main">
  <div class="people" id="peoplePanel"></div>
  <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div class="alerts" id="alertsPanel"></div>
    <div class="content" id="contentPanel"></div>
  </div>
</div>

const DATA = RAW.traces;
const ROLES = RAW.roles;

let currentRole = null; // null = team overview
let currentPeriod = 30;
let mindPeriod = 30;

document.getElementById('genTime').textContent = RAW.generated;

// ── Helpers ──
function filterByPeriod(traces, days) {
  if (days <= 0) return traces;
  const now = new Date();
  const cutoff = new Date(now);
  cutoff.setDate(cutoff.getDate() - days);
  const cutStr = cutoff.toISOString().slice(0, 10);
  return traces.filter(t => t.date >= cutStr);
}

function roleTraces(role) {
  const own = DATA.filter(t => t.role === role);
  const meetings = DATA.filter(t => t.type === 'meeting');
  const seen = new Set();
  const result = [];
  for (const t of [...own, ...meetings]) {
    if (!seen.has(t.filepath)) { seen.add(t.filepath); result.push(t); }
  }
  return result.sort((a, b) => b.date.localeCompare(a.date));
}

// ── Alerts ──
function renderAlerts() {
  const panel = document.getElementById('alertsPanel');
  const alerts = [];
  for (const [role, info] of Object.entries(ROLES)) {
    const traces = DATA.filter(t => t.role === role && t.type !== 'meeting');
    if (traces.length === 0) {
      alerts.push(`<div class="alert"><span class="alert-icon">&#9888;</span> ${info.label}: 기록 없음</div>`);
    } else {
      const last = traces.sort((a,b) => b.date.localeCompare(a.date))[0];
      const daysSince = Math.floor((new Date() - new Date(last.date)) / 86400000);
      if (daysSince > 14) {
        alerts.push(`<div class="alert"><span class="alert-icon">&#9888;</span> ${info.label}: 마지막 기록 ${daysSince}일 전</div>`);
      }
    }
  }
  panel.innerHTML = alerts.length ? alerts.join('') : '';
  panel.style.display = alerts.length ? 'block' : 'none';
}

  const panel = document.getElementById('peoplePanel');
  const sorted = Object.entries(ROLES).sort((a,b) => b[1].last_date.localeCompare(a[1].last_date));

  let html = `<div class="person-card ${currentRole === null ? 'active' : ''}" style="--card-color:#8b5cf6" onclick="selectRole(null)">
    <div class="pc-header"><div class="pc-dot" style="background:linear-gradient(135deg,#6366f1,#f43f5e)"></div><span class="pc-name">Team Overview</span></div>
    <div class="pc-meta"><span>${DATA.length} events</span></div>
  </div>`;

  for (const [role, info] of sorted) {
    const traces = DATA.filter(t => t.role === role && t.type !== 'meeting');
    const latest = traces.sort((a,b) => b.date.localeCompare(a.date))[0];
    const color = info.color;
    html += `<div class="person-card ${currentRole === role ? 'active' : ''}" style="--card-color:${color}" onclick="selectRole('${role}')">
      <div class="pc-header"><div class="pc-dot" style="background:${color}"></div>
        <div><div class="pc-name">${info.label}</div></div>
      </div>
      ${latest ? `<div class="pc-mind"><strong>Latest:</strong> ${latest.topic}</div>` : '<div class="pc-mind" style="color:var(--text-muted)">기록 없음</div>'}
      <div class="pc-meta"><span>${info.trace_count} traces</span><span>${info.last_date || '-'}</span></div>
    </div>`;
  }
  panel.innerHTML = html;
}

// ── Mind Snapshot ──
function renderMind(role, days, color) {
  const traces = DATA.filter(t => t.role === role && t.type !== 'meeting');
  const filtered = filterByPeriod(traces, days).sort((a,b) => b.date.localeCompare(a.date));
  const label = days <= 0 ? '전체' : `최근 ${days}일`;

  const tabs = [1,7,30,0].map(d =>
    `<button class="mind-btn ${days===d?'active':''}" onclick="setMindPeriod(${d})">${d<=0?'전체':d+'일'}</button>`
  ).join('');

  if (filtered.length === 0) {
    return `<div class="mind"><div class="mind-head"><h3>지금 머릿속 (${label})</h3><div class="mind-tabs">${tabs}</div></div><div class="mind-empty">이 기간에 기록 없음</div></div>`;
  }

  const items = filtered.slice(0, 6).map((t, i) => `
    <div class="mind-item" style="--item-color:${color};${i===0?`border-left-color:${color}`:''}">
      <div class="mi-topic">${t.topic}</div>
      ${t.insight ? `<div class="mi-insight">"${t.insight}"</div>` : ''}
      <div class="mi-date">${t.date}</div>
    </div>
  `).join('');

  return `<div class="mind"><div class="mind-head"><h3>지금 머릿속 (${label})</h3><div class="mind-tabs">${tabs}</div></div>${items}</div>`;
}

// ── Timeline ──
function renderTimeline(traces, color) {
  const chrono = [...traces].sort((a,b) => a.date.localeCompare(b.date));
  let html = '';
  let curDate = '';

  for (const t of chrono) {
    if (t.date !== curDate) {
      curDate = t.date;
      html += `<div class="date-group"><div class="date-label">${t.date}</div>`;
    }

    const cardColor = t.type === 'meeting' ? '' : `--card-color:${color}`;
    const cls = t.type === 'meeting' ? 'meeting-card' : 'trace-card';

    html += `<div class="${cls}" style="${cardColor}" onclick="this.classList.toggle('expanded')">
      <div class="tc-type" style="color:${t.type==='meeting'?'var(--meeting)':color}">${t.type}</div>
      <div class="tc-topic">${t.topic}</div>
      ${t.summary ? `<div class="tc-summary">${t.summary.slice(0, 120)}${t.summary.length > 120 ? '...' : ''}</div>` : ''}
      <div class="tc-detail">
        ${t.decision ? `<h4>Decision</h4><p>${t.decision}</p>` : ''}
        ${t.insight ? `<h4>Insight</h4><p>${t.insight}</p>` : ''}
        <div class="tc-file">${t.filepath}</div>
      </div>
    </div>`;
  }
  // Close last date group
  if (curDate) html += '</div>';
  return html;
}

// ── Views ──
function renderTeamView() {
  const panel = document.getElementById('contentPanel');
  const sorted = Object.entries(ROLES).sort((a,b) => b[1].last_date.localeCompare(a[1].last_date));

  let html = `<div class="team-header"><h2>Team Overview</h2><p>모든 역할의 사고 흐름을 한눈에</p></div>`;

  for (const [role, info] of sorted) {
    const traces = roleTraces(role);
    const filtered = filterByPeriod(traces, currentPeriod);
    const roleOnly = filtered.filter(t => t.type !== 'meeting');
    const color = info.color;

    html += `<div class="all-lane">
      <div class="lane-head">
        <div class="lane-dot" style="background:${color}"></div>
        <span class="lane-name" style="color:${color}">${info.label}</span>
        <span class="lane-count">${roleOnly.length} traces</span>
      </div>`;

    // Show top 3 recent traces inline
    const recent = roleOnly.sort((a,b) => b.date.localeCompare(a.date)).slice(0, 3);
    if (recent.length === 0) {
      html += '<div style="margin-left:20px;font-size:12px;color:var(--text-muted);font-style:italic">기록 없음</div>';
    } else {
      for (const t of recent) {
        html += `<div class="trace-card" style="--card-color:${color}" onclick="this.classList.toggle('expanded')">
          <div class="tc-type" style="color:${color}">${t.date} &middot; ${t.type}</div>
          <div class="tc-topic">${t.topic}</div>
          ${t.insight ? `<div class="tc-summary" style="font-style:italic">"${t.insight.slice(0,120)}${t.insight.length>120?'...':''}"</div>` : ''}
          <div class="tc-detail">
            ${t.decision ? `<h4>Decision</h4><p>${t.decision}</p>` : ''}
            ${t.summary ? `<h4>Summary</h4><p>${t.summary}</p>` : ''}
            <div class="tc-file">${t.filepath}</div>
          </div>
        </div>`;
      }
    }
    html += '</div>';
  }
  panel.innerHTML = html;
}

function renderRoleView(role) {
  const panel = document.getElementById('contentPanel');
  const info = ROLES[role];
  const color = info.color;
  const traces = roleTraces(role);

  let html = renderMind(role, mindPeriod, color);
  html += '<div style="margin-top:8px">';
  html += renderTimeline(traces, color);
  html += '</div>';
  panel.innerHTML = html;
}

// ── Actions ──
function selectRole(role) {
  currentRole = role;
  mindPeriod = 30;
  render();
}

function setPeriod(days) {
  currentPeriod = days;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function setMindPeriod(days) {
  mindPeriod = days;
  if (currentRole) renderRoleView(currentRole);
}

function render() {
  renderPeople();
  renderAlerts();
  if (currentRole) renderRoleView(currentRole);
  else renderTeamView();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') document.querySelectorAll('.expanded').forEach(c => c.classList.remove('expanded')); });

render();
</script>
</body>
</html>
